###############################################
# MediaMTX Configuration - LOCAL DEVELOPMENT
###############################################
# 
# This configuration is optimized for LOCAL development:
# - All services bound to 127.0.0.1 (localhost only)
# - Hardcoded backend URL for local FastAPI instance
# - Uses curl.exe for Windows compatibility
# - Strict CORS for development servers
# - Hardcoded secret placeholder for simplicity
# 
# SETUP:
# 1. Get MEDIAMTX_SECRET from server/.env
# 2. Search for "YOUR_SECRET_HERE" in this file (appears 2 times)
# 3. Replace with your actual secret value
# 4. Start MediaMTX: .\mediamtx\mediamtx.exe mediamtx.local.yml
# 
# ALTERNATIVE: Use helper script (auto-loads secret from server/.env):
#              .\scripts\start-mediamtx-local.ps1
# 
# For Docker deployment, use mediamtx.docker.yml instead!
###############################################
###############################################

###############################################
# Global settings -> General

logLevel: info
logDestinations: [stdout, file]
logFile: mediamtx.log
sysLogPrefix: mediamtx

readTimeout: 10s
writeTimeout: 10s
writeQueueSize: 512
udpMaxPayloadSize: 1472

runOnConnect:
runOnConnectRestart: no
runOnDisconnect:

###############################################
# Global settings -> Authentication
#
# SECURITY: JWT-based authentication ONLY
# All access requires valid JWT from backend
###############################################

# JWT authentication - backend is the sole authority
authMethod: jwt

# Internal authentication DISABLED - no anonymous users
authInternalUsers: []

# HTTP-based authentication DISABLED
authHTTPAddress:
authHTTPExclude: []

# JWT-based authentication configuration
# Backend JWKS endpoint provides public keys for JWT validation
# LOCAL: Uses localhost backend (127.0.0.1:8000)
authJWTJWKS: http://127.0.0.1:8000/.well-known/jwks.json
authJWTJWKSFingerprint:
# Claim containing MediaMTX permissions
authJWTClaimKey: mediamtx_permissions
# Exclude Admin API and Playback from JWT (already protected by localhost binding)
authJWTExclude:
  - action: api
  - action: playback
# SECURITY: Disable JWT in query params - must use Authorization header
# Note: Set to true if you need HLS streaming in browser (HLS.js compatibility)
authJWTInHTTPQuery: false

###############################################
# Global settings -> Control API
#
# SECURITY: Bound to localhost only
# Accessible only by backend application
###############################################

api: yes
# LOCAL: Localhost only - not accessible from LAN
apiAddress: 127.0.0.1:9997
apiEncryption: no
apiServerKey: server.key
apiServerCert: server.crt
# SECURITY: Restrict CORS (allow frontend dev server and backend)
apiAllowOrigins: ['http://127.0.0.1:8000', 'http://localhost:5173', 'http://localhost:8000']
apiTrustedProxies: []

###############################################
# Global settings -> Metrics
#
# SECURITY: Disabled in production
###############################################

metrics: no
metricsAddress: 127.0.0.1:9998
metricsEncryption: no
metricsServerKey: server.key
metricsServerCert: server.crt
metricsAllowOrigins: []
metricsTrustedProxies: []

###############################################
# Global settings -> PPROF
#
# SECURITY: Disabled in production
###############################################

pprof: no
pprofAddress: 127.0.0.1:9999
pprofEncryption: no
pprofServerKey: server.key
pprofServerCert: server.crt
pprofAllowOrigins: []
pprofTrustedProxies: []

###############################################
# Global settings -> Playback server
#
# SECURITY: Localhost only - recordings accessed via backend proxy
###############################################

playback: yes
# LOCAL: Localhost only
playbackAddress: 127.0.0.1:9996
playbackEncryption: no
playbackServerKey: server.key
playbackServerCert: server.crt
# SECURITY: Restrict CORS (allow frontend dev server and backend)
playbackAllowOrigins: ['http://127.0.0.1:8000', 'http://localhost:5173', 'http://localhost:8000']
playbackTrustedProxies: []

###############################################
# Global settings -> RTSP server
#
# SECURITY: Localhost only - cameras connect internally
###############################################

rtsp: yes
# TCP only for localhost - UDP disabled to prevent external access
rtspTransports: [tcp]
rtspEncryption: "no"
# LOCAL: Localhost only
rtspAddress: 127.0.0.1:8554
rtspsAddress: 127.0.0.1:8322
# SECURITY: Disable UDP listeners (localhost TCP only)
rtpAddress: 127.0.0.1:8000
rtcpAddress: 127.0.0.1:8001
multicastIPRange: 224.1.0.0/16
multicastRTPPort: 8002
multicastRTCPPort: 8003
srtpAddress: 127.0.0.1:8004
srtcpAddress: 127.0.0.1:8005
multicastSRTPPort: 8006
multicastSRTCPPort: 8007
rtspServerKey: server.key
rtspServerCert: server.crt
rtspAuthMethods: [basic]
rtspUDPReadBufferSize: 0

###############################################
# Global settings -> RTMP server
#
# SECURITY: DISABLED - not needed, reduces attack surface
###############################################

rtmp: no
rtmpAddress: 127.0.0.1:1935
rtmpEncryption: "no"
rtmpsAddress: 127.0.0.1:1936
rtmpServerKey: server.key
rtmpServerCert: server.crt

###############################################
# Global settings -> HLS server
#
# SECURITY: Localhost only - accessed via backend proxy
###############################################

hls: yes
# LOCAL: Localhost only
hlsAddress: 127.0.0.1:8888
hlsEncryption: no
hlsServerKey: server.key
hlsServerCert: server.crt
# SECURITY: Restrict CORS (allow frontend dev server and backend)
hlsAllowOrigins: ['http://127.0.0.1:8000', 'http://localhost:5173', 'http://localhost:8000']
hlsTrustedProxies: []
hlsAlwaysRemux: no
hlsVariant: fmp4
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 200ms
hlsSegmentMaxSize: 50M
hlsDirectory: ''
hlsMuxerCloseAfter: 60s

###############################################
# Global settings -> WebRTC server
#
# SECURITY: Localhost only with IP leakage prevention
###############################################

webrtc: yes
# LOCAL: Localhost only
webrtcAddress: 127.0.0.1:8889
webrtcEncryption: no
webrtcServerKey: server.key
webrtcServerCert: server.crt
# SECURITY: Restrict CORS (allow frontend dev server and backend)
webrtcAllowOrigins: ['http://127.0.0.1:8000', 'http://localhost:5173', 'http://localhost:8000']
webrtcTrustedProxies: []
# LOCAL: Localhost only for UDP/TCP listeners
webrtcLocalUDPAddress: 127.0.0.1:8189
webrtcLocalTCPAddress: 127.0.0.1:8189
# SECURITY: Prevent LAN IP leakage in SDP
webrtcIPsFromInterfaces: no
webrtcIPsFromInterfacesList: []
# Only localhost - no LAN IPs exposed
webrtcAdditionalHosts: [127.0.0.1]
webrtcICEServers2: []
webrtcHandshakeTimeout: 10s
webrtcTrackGatherTimeout: 2s
webrtcSTUNGatherTimeout: 5s

###############################################
# Global settings -> SRT server
#
# SECURITY: DISABLED - not needed, reduces attack surface
###############################################

srt: no
srtAddress: 127.0.0.1:8890

###############################################
# Default path settings
#
# SECURITY: Deny-by-default, no publisher hijacking
###############################################
pathDefaults:

  ###############################################
  # Default path settings -> General

  source: publisher
  sourceFingerprint:
  sourceOnDemand: no
  sourceOnDemandStartTimeout: 10s
  sourceOnDemandCloseAfter: 10s
  # SECURITY: Limit concurrent readers per stream
  maxReaders: 10
  srtReadPassphrase:
  fallback:
  useAbsoluteTimestamp: false

  ###############################################
  # Default path settings -> Record
  #
  # Recording enabled but only accessible via backend

  record: yes
  recordPath:
  recordFormat: fmp4
  recordPartDuration: 1s
  recordMaxPartSize: 50M
  recordSegmentDuration: 1h
  recordDeleteAfter: 0s

  ###############################################
  # Default path settings -> Publisher source
  #
  # SECURITY: Prevent publisher hijacking

  # SECURITY: Do NOT allow publisher override - prevents stream hijacking
  overridePublisher: no
  srtPublishPassphrase:

  ###############################################
  # Default path settings -> RTSP source

  rtspTransport: tcp
  rtspAnyPort: no
  rtspRangeType:
  rtspRangeStart:
  rtspUDPReadBufferSize: 0

  ###############################################
  # Default path settings -> MPEG-TS source

  mpegtsUDPReadBufferSize: 0

  ###############################################
  # Default path settings -> RTP source

  rtpSDP:
  rtpUDPReadBufferSize: 0

  ###############################################
  # Default path settings -> Redirect source

  sourceRedirect:

  ###############################################
  # Default path settings -> Raspberry Pi Camera source

  rpiCameraCamID: 0
  rpiCameraSecondary: false
  rpiCameraWidth: 1920
  rpiCameraHeight: 1080
  rpiCameraHFlip: false
  rpiCameraVFlip: false
  rpiCameraBrightness: 0
  rpiCameraContrast: 1
  rpiCameraSaturation: 1
  rpiCameraSharpness: 1
  rpiCameraExposure: normal
  rpiCameraAWB: auto
  rpiCameraAWBGains: [0, 0]
  rpiCameraDenoise: "off"
  rpiCameraShutter: 0
  rpiCameraMetering: centre
  rpiCameraGain: 0
  rpiCameraEV: 0
  rpiCameraROI:
  rpiCameraHDR: false
  rpiCameraTuningFile:
  rpiCameraMode:
  rpiCameraFPS: 30
  rpiCameraAfMode: continuous
  rpiCameraAfRange: normal
  rpiCameraAfSpeed: normal
  rpiCameraLensPosition: 0.0
  rpiCameraAfWindow:
  rpiCameraFlickerPeriod: 0
  rpiCameraTextOverlayEnable: false
  rpiCameraTextOverlay: '%Y-%m-%d %H:%M:%S - MediaMTX'
  rpiCameraCodec: auto
  rpiCameraIDRPeriod: 60
  rpiCameraBitrate: 5000000
  rpiCameraHardwareH264Profile: main
  rpiCameraHardwareH264Level: '4.1'
  rpiCameraSoftwareH264Profile: baseline
  rpiCameraSoftwareH264Level: '4.1'
  rpiCameraMJPEGQuality: 60

  ###############################################
  # Default path settings -> Hooks
  #
  # LOCAL: All hooks call localhost backend with secret header
  # 
  # IMPORTANT: Replace YOUR_SECRET_HERE (appears 2 times below)
  # 
  # Steps:
  # 1. Get MEDIAMTX_SECRET value from server/.env file
  # 2. Search for "YOUR_SECRET_HERE" in this file
  # 3. Replace both occurrences with your actual secret
  # 
  # Example:
  #   Before: "X-MTX-Secret: YOUR_SECRET_HERE"
  #   After:  "X-MTX-Secret: c50e72422be77e0c69001f63c30817d6881db1e22fa529411c3ebe6ba04f40cc"
  # 
  # NOTE: Uses curl.exe on Windows (not PowerShell's curl alias)
  ###############################################

  # Startup hook - calls backend with secret
  runOnInit: 'curl.exe -X GET -H "X-MTX-Secret: YOUR_SECRET_HERE" "http://127.0.0.1:8000/api/v1/mediamtx/startup/hook?delay=5"'
  runOnInitRestart: no

  runOnDemand:
  runOnDemandRestart: no
  runOnDemandStartTimeout: 10s
  runOnDemandCloseAfter: 10s
  runOnUnDemand:

  runOnReady:
  runOnReadyRestart: no
  runOnNotReady:

  runOnRead:
  runOnReadRestart: no
  runOnUnread:

  runOnRecordSegmentCreate:

  # Segment complete hook - calls backend with secret
  runOnRecordSegmentComplete: 'curl.exe -X GET -H "X-MTX-Secret: YOUR_SECRET_HERE" "http://127.0.0.1:8000/api/v1/mediamtx/hooks/segment-complete?path=$MTX_PATH&segment_path=$MTX_SEGMENT_PATH&segment_duration=$MTX_SEGMENT_DURATION"'

###############################################
# Path settings
#
# Paths are dynamically provisioned by backend
# Only __startup__ path is static to trigger runOnInit hook
###############################################
paths:
  # Dummy path to trigger startup hook - provisions cameras from database
  # This path initializes on MediaMTX start, calling runOnInit which
  # provisions all cameras from the backend database
  __startup__:
    source: publisher
    record: no
