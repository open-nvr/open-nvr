[supervisord]
nodaemon=true
logfile=/app/logs/supervisord.log
pidfile=/app/supervisord.pid

[program:opennvr-backend]
command=/app/server-venv/bin/python -m uvicorn server.main:app --host 0.0.0.0 --port 8000
directory=/app
autostart=true
autorestart=true
stdout_logfile=/app/logs/opennvr-backend.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=3
stderr_logfile=/app/logs/opennvr-backend-error.log
stderr_logfile_maxbytes=50MB
stderr_logfile_backups=3
priority=1
environment=PYTHONUNBUFFERED="1"

[program:kai-c]
command=/app/kai-c-venv/bin/python -m uvicorn main:app --host 0.0.0.0 --port 8100
directory=/app/kai-c
autostart=true
autorestart=true
stdout_logfile=/app/logs/kai-c.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=3
stderr_logfile=/app/logs/kai-c-error.log
stderr_logfile_maxbytes=50MB
stderr_logfile_backups=3
priority=2
environment=PYTHONUNBUFFERED="1",ADAPTER_URL="%(ENV_ADAPTER_URL)s",INTERNAL_API_KEY="%(ENV_INTERNAL_API_KEY)s"

