# Ruff configuration for OpenNVR backend
# Docs: https://docs.astral.sh/ruff/

# Target Python version
target-version = "py311"

# Line length (Black-compatible default)
line-length = 88

# Enable preview rules for cutting-edge features
preview = false

[lint]
# Enable rule categories
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort (import sorting)
    "N",     # pep8-naming
    "UP",    # pyupgrade (modernize code)
    "B",     # flake8-bugbear (catch common bugs)
    "C4",    # flake8-comprehensions
    "SIM",   # flake8-simplify
    "RUF",   # Ruff-specific rules
]

# Disable specific rules
ignore = [
    "E501",  # Line too long (handled by formatter)
    "B008",  # Do not perform function calls in argument defaults (FastAPI Depends())
    "N805",  # First argument should be named 'self' (Pydantic validators use 'cls')
]

# Allow autofix for all enabled rules
fixable = ["ALL"]
unfixable = []

# Exclude directories
exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    "migrations",
    "*.pyc",
    ".pytest_cache",
    "build",
    "dist",
]

[lint.per-file-ignores]
# Ignore import order in __init__.py files
"__init__.py" = ["F401", "F403"]
# Ignore unused imports in migration env.py
"migrations/env.py" = ["F401"]

[lint.isort]
# Import sorting configuration
known-first-party = ["core", "routers", "services", "utils", "middleware"]
force-single-line = false
combine-as-imports = true

[format]
# Use double quotes for strings
quote-style = "double"

# Indent with spaces
indent-style = "space"

# Respect magic trailing commas
skip-magic-trailing-comma = false

# Auto-detect line ending
line-ending = "auto"
